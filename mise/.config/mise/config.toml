[tools]
# Language runtimes
node = 'lts'
python = '3'
ruby = 'latest'
go = 'latest'
rust = 'latest'

# CLI tools
bun = 'latest'
claude-code = '2.1.101'
codex = 'latest'
delta = 'latest'
eza = 'latest'
fzf = 'latest'
gh = 'latest'
jq = 'latest'
lazygit = 'latest'
luajit = 'latest'
neovim = 'latest'
ollama = 'latest'
opencode = 'latest'
pipx = 'latest'
ripgrep = 'latest'
shellcheck = 'latest'
starship = 'latest'
tmux = 'latest'
# vivid 0.11.0 is advertised upstream, but the aqua backend has no usable macOS asset yet.
vivid = '0.10.1'
yt-dlp = 'latest'
zoxide = 'latest'

# Backend-specific tools
"github:backnotprop/plannotator" = 'latest'
"npm:pnpm" = 'latest'
"npm:yarn" = 'latest'
'gem:tmuxinator' = 'latest'
'go:golang.org/x/tools/gopls' = 'latest'

[settings]
idiomatic_version_file = true
not_found_auto_install = true
python = { compile = true }

[env]
EDITOR = 'nvim'
LUAROCKS_VERSION = '3.12.2'
